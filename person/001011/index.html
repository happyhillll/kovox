        <h1>박선영</h1>
        
        <p><strong>Name:</strong> 박선영</p>

        <p><strong>Medium:</strong> soprano</p>
        <p><strong>Profile:</strong> 따뜻하고 화려한 음색의 학구적인 연주자로 평가받고 있는 소프라노 박선영은 예원학교, 서울예술고등학교를 거쳐 이화여자대학교 음악대학 성악과를 졸업하고 독일의 뉘른베르크 국립음대(Hochschule fuer Musik Nuernberg)에서 성악과 석사과정 디플롬(Diplom)을 취득하였다. 오스트리아 비엔나 콘서바토리 마스터클래스를 수료(Prof.Hilda de Groote)하였으며, 이후 계속적인 음악연구를 위하여 이탈리아 가스파레스폰티니 공립음악원에서 연주학 박사(Doctorate of Specialization in Music Art)과정을 이수하고, 졸업시험을 10점 만점으로 졸업하였다.(Prof.Mauro Augustini) 음악저널 콩쿨 1위 수상을 시작으로 난파 음악 콩쿠르에서 금상을 수상하였고, 이화여대 재학시절 음악대학 정기연주회에서 이화여대 오케스트라와의 협연을 비롯해 광주시립오케스트라와의 말러 교향곡 4번(Soprano Solo) 협연 등으로 일찍이 두각을 나타내었...</p>
