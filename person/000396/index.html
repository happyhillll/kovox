        <h1>김경희</h1>
        
        <p><strong>Name:</strong> 김경희</p>

        <p><strong>Medium:</strong> soprano</p>
        <p><strong>Profile:</strong> 천상의 맑고 감미로운 목소리의 소유자 소프라노 김경희는 연세대학교 음악대학 교회음악과를 졸업하고 한국예술종합학교에서 석사를 취득한 후 도미하여 피바디 컨서바토리(Peabody Institute of The Johns Hopkins Urversity)에서 전문연주자과정 (Graduate Performance Diploma)을 졸업하였다. 일찍이 이대웅장학음악회콩쿨에서 2위를 수상으로 실력을 인정받은 소프라노 김경희는 세계적인 현대가곡 소프라노 Phyllis Bryn - Julson 의 수제자로 20세기 절대음감이 필요한 현대가곡을 연구하며 마침내 Ross Lee Finney의 &lt;Chamber Music 36개의 Song Cycle을 미국에서 초연했다. 수회에 걸친 Handel Messia 전곡을 연주한 바 있는 그녀는 TH. Dubois의 &#x27;The Seven Last Words of Christ, Brahms Requiem; Haydn The Creation, Nelson Mass, ...</p>
