        <p><strong>Profile:</strong> 뮤지컬배우 김민주는 한국체육대학교를 졸업하고 2005년 뮤지컬 그리스로 데뷔하였다. 이후 지킬앤하이드, 올슉업, 맨오브라만차 와 같은 작품에 출연하였고 2007년 뮤지컬 헤어스프레이의 ‘앰버’를 시작으로 모차르트오페라락, 쌍화별곡, 어쌔신 등 굵직한 작품에서 주역의 길을 밟아왔다. 또한 창작뮤지컬 싱글즈, 환상의커플, 너에게빛의속도로간다, 위대한캣츠비 등 소극장 무대까지 넘나들며 노래뿐 아니라 연기자로서의 능력을 인정받는 배우로 평판받고있다. 최근에는 다양한 이벤트무대 및 콘서트에서 공연자와 사회자로까지 초빙되는 만능 엔터테이너이다.</p>
