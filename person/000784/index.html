        <p><strong>Profile:</strong> 화려한 음색과 감각 있는 음악성으로 품격있는 무대를 선사하는 소프라노 송영옥은 서울 대학교 음악대학 성악과를 졸업하고 국립합창단원으로 활동하였고 그 기간 중 윌리엄 데닝이 지휘한 본 윌리암스의 ‘세레나데 투 뮤직(Serenade to Music)’에서 솔로를 맡은 것을 비롯하여 코리안 심포니 오케스트라가 제작한 찬송가 전곡 중 다수의 곡의 솔로 연주 등 폭 넓은 연주 활동을 가진 후 도미하였다. ‘남부의 하버드’라 불리우는 미국 밴더빌트 대학교 블레어 음대에서 성악 과정을 이수하던 중 그녀는 블레어 음대의 가장 큰 행사인 ‘Night at the Opera’에 지도교수 에미미 자먼(Amy Kane Jarman)의 적극적인 추천으로 R.Strauss의 오페라 ‘장미의 기사’의 주역 (마샬린 역)으로 출연하여 블레어 음대 성악과 학과장인 연출자 조나단 레츨라프 박사로부터 “마샬린 역에 가장 적합한 아름답고 폭 넓은 소리의 프리마돈나”라는 호평을 받은 바 있다. 그 외에도 전미성악교수협회...</p>
