        <p><strong>Profile:</strong> 소프라노 양윤주는 예원학교와 서울예술고등학교를 거쳐 이화여자대학교 성악과를 수학하였다. 졸업 후 도미하여 미네소타 주립대학교에서 성악과 석사학위와 2011년 노스텍사스 주립대학교에서 성악과 박사학위(Doctor of Musical Arts)를 취득하였다. 박사학위 취득과 함께 오페라를 부전공, 현대음악을 전문으로 하며 전문연주자로서의 기반을 다졌다. 현대음악 전문연주자로서 그녀는 &quot;도날드 마티노의 12음 기법을 이용한 연작 가곡들(A Practical Approach to Donald Martino&#x27;s Twelve-Tone Song Cycles for Performance)&quot;을 주제로 한 박사학위논문에서 현대음악에 쉽게 다가갈 수 있는 방법론을 제시하였다. 미국 유학 시절, 노스텍사스 대학교에서 Academic Achievement Scholarship, USC Scholarship, James J. Scott Scholarship, School of Music Competitive...</p>
