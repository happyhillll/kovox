        <p><strong>Profile:</strong> 숙명여자대학교에서 이순희, 임명애 교수님, 맨하탄 음대에서 Marlana Malas 선생님께 사사했다. 대학시절, 정기연주오페라 Cosi Fan Tutte, 협주곡의 밤, RAM Festival Beethoven symphony No.9 (예술의전당), 프랑스음악협회주관 멜로디의 밤 등을 연주했고, 중국청도에서 한중 국제 교류 음악콘서트, 독도음악회 (독도선착장), KBS 불후의 명곡 (양희은편) 등에 출연하며 연주자로서 두각을 나타내었다. 졸업 후 도미하여 밤의 여왕 역으로 Chautauqua Music Festival, New York Lyric Opera 등 에서 공연하였고, 메릴랜드 영아티스트 프로그램에서 Louis Salemno의 지휘 아래 Don Giovanni-Zerlina, Cosi fan tutte -Despina, 뉴욕 IVAI 프로그램 장학생으로 Manon-Manon을 연주하였고, L&#x27; elisir d&#x27; amore-Adina, Venus &amp; Adonis-Venus...</p>
