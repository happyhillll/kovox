        <h1>우종우</h1>
        
        <p><strong>Name:</strong> 우종우</p>

        <p><strong>Medium:</strong> tenor</p>
        <p><strong>Profile:</strong> 테너 우종우는 인천예술고등학교를 졸업 후, 한양대학교 음악대학 성악과에 입학하여 소프라노 박정원 을 사사하였다. 졸업과 동시에 미국 Peabody Institute of the Johns Hopkins University에 입학하여(Merit-scholarship 수여), Dr. Stanley Cornett 교수를 사사하며 성악과 Master of Music 과정을 졸업하였다. 피바디 음악원 재학시절 모차르트 오페라 “마술피리(Die Zauberflote)”의 타미노(Tamino) 역을 시작으로 도니제티 오페라 “사랑의 묘약(L’elisir D’amore)”에서 네모리노(Nemorino)역을 맡아 미국 내 저명한 오페라 지휘자인 Leonardo Vordoni와 함께 성공적인 무대를 가졌다. 또한, Chicago Skokie 극장에서 모차르트 오페라 “티토 황제의 자비(La clemenza di Tito)” 의 티토(Tito) 역을 맡아 연기하였고, 이외에 Oratorio에 대한 남다...</p>
