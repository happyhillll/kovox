        <p><strong>Profile:</strong> 메조소프라노 이미선은 고양예술고등학교를 거쳐 연세대학교 음악대학을 졸업하였다. 연세대학교 재학 중 독일 하노버 극장에서 진행되는 MusikForbildung(실무연수과정)에 발탁되어 2회 수료하였고 이후 동 대학원에서 석사과정 및 박사과정을 우수한 성적으로 졸업하였다. 박사 과정에서는 ‘푸시킨과 튜체프의 시를 가사로 한 라흐마니노프의 예술가곡 연구’논문을 통하여 전문 연주자로서의 기반을 마련하였다. 또한 세종문화회관에서 기획한 컨템퍼러리 시즌 Sync Next 22(싱크 넥스트)에서 O’Play &lt;파우스트: 악마의 속삭임&gt; 시에벨 역으로 데뷔한 그녀는 이후 서울시오페라단 &lt;리골레토&gt;에 출연하며 전문 연주자로서 활발한 음악적 활동을 이어나가고 있다. 장현주 교수를 사사한 그녀는 대원국제중, 배화여중, 하나고 강사로 활동하였고, 월드비전합창단에서 성악 교사로 근무하였다. 현재는 고양예술고등학교와 연세대학교에 출강하여 후학 양성에 힘쓰고 있다.</p>
