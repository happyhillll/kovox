        <p><strong>Profile:</strong> 소프라노 강진희는 서울예술고등학교 서울대학교 음악대학을 졸업한 후 독일의 로버트 슈만 국립음대(Robert-Schumann Musik Hochschule, Düsseldorf)에서 석사 및 최고연주자과정(Konzert Examen)을 최우등으로 졸업하였다. 재학 중인 1993년 쾰른시립오페라단(Köln Stadt Oper) 공개오디션에 합격한 후 솔리스토로 수십 회에 걸쳐 연주활동을 하였다. Elisabeth Schwarzkopf, Gunula Janowitz, Norman Schetler, Kelly Klesie의 마스터 클라스에 Active로 참가하여 “독일가곡 해석이 탁월한 연주자”라는 평가를 받았다. 연주자로서 강진희는 우리나라, 독일, 네덜란드, 미국, 일본, 중국, 러시아 등지에서 활발한 연주활동을 해오고 있다. 독일 Solingen, Düsseldorf, 귀국독창회(1994)를 비롯하여 미국 Youngstown State University(2010) 초청독창회, Man...</p>
