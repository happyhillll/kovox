        <p><strong>Profile:</strong> 고현아는 바그너의 &lt;발퀴레&gt; 콘서트에서 지글런데 역으로, 유럽의 권위 있는 오베라 전문 잡지인 「Opernwelt」는 고현아를 2010-11 시즌 올해의 신인 예술가 후보로 노미네 이트 받았고, 그녀는 유럽 무대에서 본격적으로 주목받기 시작했다. 곧이어 2012년도 Gottlobirick 협회에서 &#x27;오페라 가수상&#x27; 메달을 수상하였다. 2012년에 오스트리아 빈 폴크스오퍼(Volksoper Wien)에서 &lt;외투&gt;의 주인공으로의 발탁은 그녀에게 거대한 유럽의 문을 열어주었다. 빈 슈타츠오퍼에서 &lt;피터 그라임스〉로 데뷔하면서. 2013년부터 4년간 빈 슈타츠오피 (Wiener Staatsoper)의 전속 솔리스트로 활약했다. 당시에 아시아 첫 여성 전속 솔리 스트라는스포트라이트를 받았다. 그리고 &lt;아드리아나 레쿠브리르&gt;, &lt;교활한 여우&gt;, &lt;예누파&gt;.&lt;파지팔&gt;,&lt;발퀴레&gt;,&lt;헨과 안톤&gt;,&lt;운디네&gt;.&lt;배치워크&gt;, &lt;나비부인&gt; 등의 연주를 통해서 그녀의 이름이 유럽으로 퍼졌다. 특히 세계적인 ...</p>
