        <p><strong>Profile:</strong> 소프라노 김유진은 한양대학교 성악과를 성적 우수상(Cum Laude)을 수여받으며 졸업한 후 도미하여 뉴 잉글랜드 콘서바토리(New England Conservatory of Music)에서 Vocal performance 석사과정(Master of Music)을 성적우수자로 졸업하였다. 이후 일리노이 대학교(University of Illinois Urbana-Champaign)의 Vocal performance and literature(성악 연주 및 문학) 박사과정(Doctor of Musical Arts)에서 학위논문으로 &quot;From Machiavelli to Zarzuela: A Performer’s Guide to William Bolcom’s Opera Lucrezia&quot;를 발표하며 박사학위를 취득하였고 전액 장학생으로서 우수한 성적으로 졸업하였다. 또한 &#x27;Performance and Practice&#x27; 부전공으로 이와 같이 나라별 음악 연주법에 대한 연구를 마치며 현대음악부...</p>
