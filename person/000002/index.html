        <p><strong>Profile:</strong> 서울대학교 음악대학 피아노과를 졸업 후 프랑스 Ecole Normal de Musique au Paris에서 Diplom Superieur d’Accompagnement au Piano 와 Diplom Superieur Musik de Chambre 를 취득한 피아니스트 최은주는 약 30여 년간 연주자로 활동하며 서울대학교 오페라연구소, 서울시오페라단, 대구오페라하우스 등에서 30여 편의 오페라반주 및 음악코치, 300여 회의 연주회에서 연주했다. 그 외에도 연주단체 Amichbelli를 만들어 현재, 16회의 랜선 음악회를 지속적으로 이어나가고 있는 등 클래식계의 최일선에서 활발히 활동 중인 현재진행형 피아니스트이다. 서울국제콩쿨공식 반주자, 서울대, 한세대 및 동대학원 강사를 역임하고 수원대학교 대학원과 성신여자대학교 대학원 반주과에 출강 중이다.</p>
