        <p><strong>Profile:</strong> 노먼 쉐들러(Norman Shetler)는 전문 가곡 반주자로서 명성을 떨치는 인물로 휘셔 디스카우, 크리스타 루드 비히, 페터 슈라이어 등 유명 성악가들의 무대에서 반주를 맡아왔다. 또 나탄 밀스타인 (러시아 바이올리 니스트), 레너드 로즈 (미국 첼리스트) 등과 함께 수준 높은 무대를 연출하면서 실내악 연주자로서의 두각도 나타냈다. 그는 독일 뷔르츠부르크 음악대학, 비엔나 국립음대 교수로 재직했으며 다년간 잘츠부르크 모차르테움 마스터클래스 교수로 참여했고 현재 유럽 전 지역과 미국, 일본, 중국, 러시아 등지에서 연주활동을 펼치고 있다. 또 슈베르트에 대한 독보적인 해석과 연주는 그의 심오한 예술세계를 보여주고 있으며 지금까지 60여개가 넘는 활발한 음반작업으로 많은 상을 수상했다.</p>
