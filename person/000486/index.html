        <p><strong>Profile:</strong> 도쿄예술대학 음악학부 피아노과를 졸업. 그 후 독일 슈투트가르트 국립 음악대학 대학원과 독일 칼스루에 국립 음악대학 대학원에서 세계적인 피아니스트 하트무트 휠을 사사했다. 일본 예대 재학시절부터 도쿄 실내가극장 등에서 반주자로 활동을 시작했으며, 현재 일본 국내뿐만 아니라 유럽과 아시아를 무대로 콘서트 솔로 피아니스트와 실내악, 성악 반주자로서 저명연주가들과 함께 활발한 활동을 하고 있다. 수많은 라디오 방송녹음과 CD등이 제작되었으며, 국제 슈만 콩쿠르 공식 피아니스트를 역임하였고, 2003년 12월부터 시작된 아사히신문사 주최의 세계 최초 &lt;볼프가곡 전곡 연주회 시리즈&gt;의 총 감독 겸 반주자로서 여러 신문과 음악 잡지의 주목을 받아왔고 그 예술성을 인정받아 2008년 일본 문화청이 수여하는 일본 최고권위의 &lt;문화청 예술제 상&gt;에서 대상을 수상하였다. 현재 센조쿠학원 음악대학 및 다마가와 음악대학 교수로 후학을 양성하고 있다.</p>
