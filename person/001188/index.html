        <p><strong>Profile:</strong> 바리톤 김기훈은 2019 차이코프스키 콩쿠르 남자성악부문 2위와 2019 오떠랄리아 2위 및 청중상을 연이어 수상하며 실력을 인정받아 국내외에서 크게 주목 받았다. 김기훈은 연세대학교 음악대학 수석 줄업 및 독일 하노버 음대 석사를 만장일치 만점으로 좋업했으며, 현재 동대학 최고연주자과정 중이다. 2016년부터 3년간 하노버 슈타츠오퍼에서 솔리스트로 활동했으며, 2019/20 시준부터 프리랜서로 활동 중이다. 김기훈은 2016 서울국제콩쿠르에서 우승했으며, 2016 뤼벡마리팀 성악콩쿠르에서 우승 및 청중상 등 총 4개 부분에서 수상하며 세계 무대에서 이름을 알리기 시작했다. 그리고 국제콩쿠르에 앞서 동아음악콩쿠르 1위, 중앙음악콩쿠르 3위, 성정콩쿠르 최우수상, 수리음악콩쿠르 대상, 엄정행콩쿠르 대상, 한국성악콩쿠르 2위를 비롯하여 국내 다수의 콩쿠르에서 우승 및 입상했다. 젊은 성악가로서 해외 무대에서 먼저 활동을 시작한 김기훈은 2016년부터 독일 하노버 슈타츠오퍼에서 솔리 스트...</p>
