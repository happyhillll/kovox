        <p><strong>Profile:</strong> 지휘자 조정현은 덕원예술고등학교 기악과(피아노 전공)와 서울대 음대 지취과 졸업 후 도미, 신시내티 음대 지취과 석사와 오메라 전문연주자 과정을 졸업하였다. 신시내티 음대 재학중 교수직을 제안 받아 2013년부터 모교인 신시내티 음대에서 교편을 잡고 있으며, 오페라 코치/ 피아니스트로 한국과 미국을 오가며 50여명 이상의 오떼라 프로덕션을 공연하는 한면 부천시향, 부산시향, 광주시향. 로체스터 팔하모닉 등 국내외 정상급 오케스트라들과 함께 연주하였다. 2015년에는 국제 블루다뉴브 오페라 지휘 콩쿨 (구 바르톡 콩쿨에서 우승하여 세계 무대에 두각을 나타내기 시작하였으며 유럽의 여러 극장에서의 데뷔가 예정되어 있다.</p>
