        <h1>김대수</h1>
        
        <p><strong>Name:</strong> 김대수</p>
        <p><strong>Role:</strong> main performer</p>
        <p><strong>Medium:</strong> baritone</p>
        <p><strong>Profile:</strong> 풍부한 음성과 세련된 음악으로 감동의 무대를 보여주는 바리톤 김대수는 연세대학교 성 악과를 졸업한 후 도독하여 에센 국립음대(Folkwang Musik Hochschule in Essen) 성악 과와 함부르크 Johannes Brahms Konservatorium의 최고연주자과정(KEX)을 최고점수 (Auszeichnung)로 졸업하였다. 졸업과 동시에 동대학에 실기전담교수로 초빙되기도 했다. 폴란드와 루마니아의 국민가수인 B. Sokorska와 G. E. Crasnaru, 세계적인 반주자인 N. Shetler, E. Schöps 등으로부터 비르투오조(Virtuoso)적인 탁월한 표현력으로 음악을 해석 하여 호연을 했다며 음악의 수도 빈(Wien)이 원하는 바리톤 이라는 찬사를 받았다. 유럽의 17개도시 공연과 동아시아문화도시 중국 취안저우시 개막식에 한국대표로 연주하였고 일본 교토와 오사카, 캐나다 밴쿠버, 세계인권상시상식 초청연주, 세계인권포럼, 제주국제관악제 등 국제적인 콘서트...</p>
