        <p><strong>Profile:</strong> 소프라노 손지수는 선화예술학교, 선화예술고등학교에서 매년 신영옥 장학재단 장학금을 받으며 우수한 성적으로 졸업한 후 서울대학교 음악대학 성악과를 수석으로 졸업하였고 일찍이 탁월한 재능을 인정받았다. 국립오페라단콩쿨 대상, 이대웅콩쿨 1위, 신영옥콩쿨 금상, 성정음악콩쿨1위 등 다수 유명 콩쿨에서 우승하였으며 문화체육관광부 장관상을 수여받은 바 있다. 그리고 아시아나 문화재단이 운영하는 금호영아티스트 오디션에 발탁되어 금호아트홀에서 리사이틀을 열었고, 조선일보 신인음악회에 출연하여 관객과 평단으로부터 호평을 받았다. 이후 이탈리아 밀라노로 건너가 베르디국립음악원(Conservatorio Giuseppe Verdi di Milano)에서 최고연주자과정(Canto biennio)을 졸업하였고 이탈리아 밀라노 로제툼 극장(Teatro Rosetum)에서 오페라 세빌리아의 이발사(Il Barbiere di Siviglia, G.Rossini)의 로지나(Rosina)역으로 데뷔하였다. 그 이후...</p>
