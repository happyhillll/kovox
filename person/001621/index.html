        <p><strong>Profile:</strong> 소프라노 오예은은 연세대학교 음악대학 성악과를 졸업하였다. 연세대학교 재학 중 독일 하노버 극장에서 MusikForbildung(실무연수과정)에 발탁되어 수료하였고, 졸업 이후 이탈리아 밀라노 베르디 국립음악원에서 (Canto Biennio) 최고 연주자 과정을 우수한 성적으로 졸업하였다. 또한 세계적인 소프라노 Luciana Serra 마스터 클래스에 참가하고 밀라노 도니제띠 아카데미 합창지휘과정을 수료해 음악적 견문을 넓혔다. 귀국 이후 연세대학교 음악대학원 성악과 박사과정을 졸업하고 국립오페라단 오페라스튜디오 단원 1기 역임하며 전문 연주자로서의 기반을 마련하였다. 일찍이 KSME 한국음악교육협회 전국학생 음악콩쿠르와 제39회 신라대학교 전국 중·고등학교 음악콩쿠르에서 성악 고등부 대상을 받은 소프라노 오예은은 이탈리아 Giovan Battista Rubini, Città di Magenta, Coop Music Awards 콩쿠르 입상, 부산 국제마루음악제 컴페티션 부문 2위...</p>
