        <p><strong>Profile:</strong> 피아니스트 정호정은 이화여자대학교와 영국 왕립음악원을 졸업하고 이후 미국 줄리어드 스쿨에서 석사학위와 아티스트 디플롬을 취득하였다. 줄리어드 스굴에서 수년간 오페라 코치로 일한 것을 비롯하여 국립오페라단. 서울시립오페라단, 예술의전당, 성남 문화재단, 뉴욕 그랜드 오페라, 버크셔 오페라. 샤타쿠아 인스티튜션, 다니엘 페로 성악 프로그램 등에서 오페라 코치 및 피아니스트로 활동하였다. 미국 링컨센터와 카네기홀 등에서 열린 레나타 스코토, 레온틴 프라이스, 토마스 햄슨. 호세 반담 등의 마스터 클래스에 피아니스트로 참여하였고, 린던 우드사이드 오라토리오 솔로 컴피티션, 라비니아 페스티벌, 서울국제콩쿠르 등에서 공식 반주자로 활동하였다. 현재 이화여자대학교와 서울대학교에 출강 중이다.</p>
