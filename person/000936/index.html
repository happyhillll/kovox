        <p><strong>Profile:</strong> 피아니스트 김은진은 한양대학교를 졸업한 뒤 도독하여 슈투트가르트 국립음대 전문연주자과정, 드레스덴 국립음대 최고연주자과정을 졸업하였다. 독일에서 활발한 연주활동을 펼친 그녀는 SICW 오케스트라, Freiberg 오케스트라와 협연하였고, Stuttgater Volksbank 주최 ＂Concert after Business＂ 초청독주회, C. Bechstein Centrum Tubingen 초청독주회, Baden-Wurttemberg 주립악기박물관 주최 독주회 ＇Musik Pause＇ 초청연주, ＇Aufs Podium＇ 연주시리즈 초청독주회 등 수많은 독주회를 가지며 음악적 역량을 키웠으며, 독주뿐만 아니라 각종 반주 및 앙상블 연주에도 관심을 가지고 꾸준히 참여하여 관객에게 호평을 받았다. 귀국 후 금호아트홀 독주회를 시작으로 전국에서 여러 형태의 연주로 활동 중이다. 현재 한국피아노학회 연주분과 연구위원을 맡고 있다.</p>
