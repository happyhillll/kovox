        <p><strong>Profile:</strong> 부드러운 음색과 섬세한 음악 표현력을 갖춘 소프라노 홍아름은 인천예술고등학교를 거쳐 한국예술종합학교 성악과를 졸업한 후 독일 쾰른 국립음대(Hochschule für Musik und Tanz Köln)에서 오라토리오&amp;가곡과와 오페라과 전문 연주자 과정(Diplom)을 졸업하고 이탈리아 몬테풀치아노(Montepulciano) 유럽 음악아카데미 과정을 수료하였다. 독일에서 쾰른 대성당 오라토리오의 밤 연주를 시작으로 쾰른 노이에 뮤직 페스티발, 뒤셀도르프 캄머 오케스트라 협연, 알테 오퍼 프랑크푸르트 오페라 아리아의 밤 연주에 출연하였으며, 필리핀 바기오 P.B.T.S 초청 연주, 코리안심포니, 뉴 필하모니 오케스트라 등과 협연하였고 KBS 열린음악회에도 출연하였다. 오페라 무대에서는 &lt;Rigoletto&gt; Gilda, &lt;La Bohème&gt; Musetta, &lt;Madama Butterfly&gt; Butterfly, &lt;Così fan tutte&gt; Fiordiligi, &lt;Don Giovanni&gt;...</p>
