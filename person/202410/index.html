        <p><strong>Profile:</strong> 소프라노 백재연은 연세대학교 음악대학 성악과를 졸업하고 맨하탄 음대에서 석사학위, 뉴욕 주립대학 스토니 브룩에서 박사학위를 취득 하였다. 국립오페라단, 서울시 오페라단, 대구 오페라 하우스, 경남 오페라단, 오페레 M, 인씨엠 오페라단 등과 오페라 L clisir Damore (사랑의 묘약), Don Pasquale (돈 빠스팔레), Pagliacei (광대). Carmen (카르멘), Cosi fan utte (여자는 다 그래). Te Nozze di Figaro (피가로의 결혼), &#x27;Telephone (전화). The Litle Sweep (굴뚝 청소부 쌤), Ta Cenerentola (신데렐라). 창작 오페라 &#x27;사랑방 손님과 어머니&#x27; 등에서 주역으로 출연하였다. 오라토리오 Judas Maccabaeus, Messiah에서 소프라노 솔로이스트로 연주하였고, Mahler Symphony 4번 협연을 비롯하여 브룩클린 심포니 오케스트라, 불가리아 국립교향악단, 코레일 심포니 오케스...</p>
