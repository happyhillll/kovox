        <p><strong>Name:</strong> Rudi Spring</p>

        <p><strong>Profile:</strong> 독일 출신의 Rudi Spring은 1971년부터 1975년까지 Alfred Kuppelmayer에게 작곡, 분석, 피아노 및 작곡을 공부하며, 1978년 Bregenz에서 피아노를 Heinlich Schieff에게 첼로를 새우며 음악적으로 다양한 학문을 접하며 그와 함께 많은 연주 활동을 하였다. 2014년부터 에세이를 집필하고 있으며 (성악가와 가곡반주자&gt;라는 주제의 다큐멘터리가 반영된 이후 같은 기관들로부터 위임을 받아 작곡 활동을 펼치는 동시에 현재 Munchner Hochschule für Musik und Theater(뮌헨 음악대학)에서 1999년부터 Liedgestaltung (가곡과) 전임 강사로 학생들을 가르치고 있다.</p>
