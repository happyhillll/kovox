        <p><strong>Profile:</strong> 피아니스트 방은현은 부산예고와 한양대학교 피아노과를 졸업하고, 도독하여 드레스덴 국립음대 가곡반주과(Liedklasse) 석사(Master of Music) 및 최고연주자과정(Meisterklassen-Examen)을 졸업하였으며 드레스덴 국립음대 재학 시 세계적인 리트가수 Olaf Bär와의 4년간의 학업을 통해 가곡 반주의 초석을 다졌다. 독일 Rheingau Musik Festival 및 Schleswig-Holstein Musik Festival 에 초청되어 연주하였고, 독일 Berliner Philharmonie Großersaal 및 Kammermusiksaal, Richard Wagner Stätten Graupa, 오스트리아 Salzburg Mozarteum 등에서 연주하였으며, 2016년부터 2018년까지 독일 Stadttheater Bremerhaven에서 음악코치로 활동하였다. 추계예술대학교 강사를 역임하였고, 현재 전문 연주자, 국립오페라단 오페라스튜디오 음악코...</p>
