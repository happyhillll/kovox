        <p><strong>Profile:</strong> 청아한 음색과 섬세한 음악적 표현으로 국내외 청중들을 매료시킨 소프라노 박나리는 상명대학교 음악대학 성악과를 졸업한 후 유학길에 올라 독일 에센 폴크방 국립음대 성악과 (Folkwang Universität der Künste) 석사 과정을 최고 점수 (mit Auszeichnung) 로 졸업하였다. 상명대학교 재학 당시 정기오페라 &lt;사랑의 묘약&gt; 에서 잔넷타역으로 두각을 나타냈으며 독일 유학 중에도 에센 한인회 신년음악연주, LIederabend(Dorfkirche Isenbugel), 독창회 (Neue Aula Essen) 등 다수의 음악회에서 이름을 알리며 콜로라투라 소프라노로서의 면모를 유감없이 발휘하였다. 유럽 여러 무대에서 다양한 음악적 경험을 쌓은 소프라노 박나리는 귀국 후 고양아람누리와 광명시민회관에서 오페라 &lt;코지 판 투테&gt; 의 데스피나 역, 오페라 &lt;라보엠&gt; 의 무제타 역 등 다수의 오페라 무대에 출연하여 호평을 받았다. 이외에도 비발디 &lt;글로리아&gt; KBS홀 솔리스...</p>
