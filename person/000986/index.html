        <p><strong>Profile:</strong> 피아니스트 김한길은 예원학교를 졸업하고 서품예고 재적 중 몬사 합 피야니스드 감항원 선생님발 함나 오스드리아 법으를 유학불 목날다. 변 국협법대과 판츠브뿌크너법대에서 수획블 했으여Wen Musikverein2i Wien Konberthaus 동 크고 작은 홀에서 슬교, 합성발피아니스드, 반주자료 옮생치 활물했다. 최근 귀국하여 이 아복스 드려의 퇴하니스드로, 목부 확&amp;독 심력 밥 주고로도 콜울히 활蕾 통이다. 수리학, 불의파하노, 세품대학교 몸의 콤구교에서 입삼착였으며 족현새집교잡익단객 협단을 하데다. 2009-2012년 목일의 됩학대프 Sommerakademie in Oitlrieslind에세 반주자를 역임하였다.</p>
