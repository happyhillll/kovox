        <p><strong>Name:</strong> 유선아</p>

        <p><strong>Profile:</strong> 소프라노 유선아는 지난 2001년 도미하여 미국에서 왕성하게 활동해 온 성악가이다. 2008년 베르디의 오페라 &lt;Un ballo in Maschera, 가면무도회&gt;에서 주연 ‘Amelia’로 데뷔한 이래, 카라모어 벨칸토 오페라, 브루클린 오페라, 뉴욕 리릭 오페라, 마르티나 아로요 재단 등 뉴욕과 美 동부지역의 유수 오페라단에서 &lt;La Bohème&gt;의 Mimi, &lt;Madama Butterfly&gt;의 CioCioSan, &lt;Suor Angelica&gt;의 Angelica, &lt;Don Carlos&gt;의 Élisabeth, &lt;Cosi fan tutte&gt;의 Fiordigligi, &lt;Die Zauberflöte&gt;의 Pamina 등에 출연하면서 그 실력을 인정받았다. 세계적인 일간지인 워싱턴 포스트는 “능숙하고 세련된 기교와 아름다운 목소리의 주인공” 으로 그녀를 평가했으며, 뉴욕 암스테르담 뉴스는 “이례적으로 아름다운 목소리의 소프라노” 로 그녀를 극찬한 바 있다. 가톨릭 대학교를 우수한 성적으로 졸...</p>
