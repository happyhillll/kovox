        <p><strong>Profile:</strong> 소프라노 백경원은 예원학교와 서울예술고등학교, 이화여자대학교 음악대학을 졸업하고 독일로 건너가 함부르크 국립음대(Hochschule fur Musik und Theater Hamburg), 브레멘 국립음대(Hochschule fur Kunste Bremen)를 우수한 성적으로 졸업하였다. 전국학생음악인 경연대회에서 1위 없는 2위를 차지하며 탄탄한 기본기를 인정받은 그녀는 Micado Classic Music Competition 1위는 물론 함부르크 국립음대 재학시절 예휴디 메뉴인 재단의 장학생으로 선발되어 국내는 물론 독일에서까지 그 실력을 인정받았다. 화려한 음색과 자신만의 음악적 해석으로 펼쳐지는 음악성으로 세계무대에서 활발한 활동을 펼치고 있는 소프라노 백경원은 F. Poulenc의 오페라 &lt;Dialogues des Carmelites(Germany, Forum HfMT)&gt;, C. Monteverdi의 오페라 &lt;L&#x27;ORFEO(Germany, Bremen BLG-Forum)&gt;...</p>
