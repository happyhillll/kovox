        <p><strong>Profile:</strong> 뛰어난 연기력과 매력적인 음성을 바탕으로 다수의 오페라에서 활약 중인 베이스 박의현은 세종대학교 음악과를 졸업한 후 도독하여 쾰른 국립음악대학(Hochschule fur Musik und Tanz Koln) 최고연주자과정(Konzertexamen)을 우수한 성적으로 졸업하였으며 &quot;Franz Schubert 연가곡 Winterreise, Op.89 중 Wasserflut와 Auf dem Flusse에 대한 음악 분석 연구&quot;를 논문 주제로 석사 과정(Master)을 우수한 성적으로 졸업하였다. 호소력 짙은 목소리와 감성을 바탕으로 그 음악성을 인정받아 독일 바그너 장학 재단에서 장학생으로 선발되었으며 아헨 시립극장 Theater Aachen, 트리어 시립극장 Theater Trier, 겔젠키르헨 시립극장 Musiktheater im Revier Gelsenkirchen, 쾰른 국립음대 콘서트홀, 예술의전당 콘서트홀, 마포아트센터, 영산아트홀. 광명시민회관 대극장 등 국내외 유수의 공연장...</p>
