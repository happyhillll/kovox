        <p><strong>Profile:</strong> 소프라노 오지혜는 연세대학교 음악대학 성악과를 졸업한 후 도독하여 브레멘 국립예술대(Hochschule fur kunste Bremen)에서 디플롬과정(KAZ-Diplom)과 마스터과정(Masterstudium)을 최우수 성적(1.0)으로 졸업하였다. 독일 유학시절 오페라 피가로의 결혼(백작부인), 잔니스끼끼(라우레따), 라 베툴리아 리베라타(아미탈), 라보엠(미미) 비롯해 마술피리, 코밀리토넨 등 다양한 무대에서 경험을 쌓았다. 오페라로 각색해 공연으로 선 보인 모짜르트 &#x27;Betulia liberata&#x27;에서 지역 언론사 Taz 는 &quot;아미탈 역할을 맡은 소프라는 오지혜는 성숙한 발성과 연기를 지녔다&quot;는 기사와 함께 호평하였다. 졸업후 독일 오페라극장 Stadttheater Bremerhaven 와 Theater Bremen에서 객원 솔리스트를 역임하며 예술적 행보를 이어갔다. 귀국 후 서울국제현대음악제, 무지카미아 인문예술시리즈 (브람스, 바흐, 헨델, 한국가곡), 창작산실 오페라 ...</p>
