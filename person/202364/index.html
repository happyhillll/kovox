        <p><strong>Profile:</strong> 소프라노 허은정은 한양대학교 성악과를 우수한 성적으로 졸업한 후 독일 에센 국립음악예술 대학에서 석사과정을 최고점으로 졸업하였다. 이후 독일 뒤셀도르프 chor에서 솔리스트로 발탁 되어 활동하였으며, 오페라 &lt;피가로의 결혼&gt;에서 주역인 백작부인 역을 맡아 성공적인 데뷔와 호평을 받았다. 귀국 후 대구 KBS 클래식 라디오 특집프로그램 &lt;Four Season&gt;에서 그녀의 목소리를 지역에 선보였으며, 젊은 작곡가 강한회의 작곡 발표회 &lt;회신 윤동주 귀하&gt;에 주요 독창자, 오페레타 &lt;Nicht im diesen Tone&gt;에 주역을 맡아 참신한 젊은 예술가로 주목을 받았다. 현재 KAN 엔터테인먼트 소속 양 아티스트이며 기획공연인 &lt;풍경소리&gt; 웹오페라 &lt;목자&gt;에서 주익인 복자&#x27; 역으로 출연하여 재능과 넘치는 끼를 가진 젊은 예술가로서의 가능성을 확인하였다.</p>
