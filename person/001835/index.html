        <p><strong>Profile:</strong> 감성을 울리는 깊은 음색과 독보적인 섬세한 표현을 가진 소프라노 김순영은 한양대학교 음대를 졸업 후 독일로 유학하여 만하임 국립음대(Konzert Gesang) 석사 졸업, 최고연주자(Konzert Examen) 과정을 수료하였다. 동아음악콩쿠르, 스위스 제네바 국제콩쿠르 입상하고 성정음악콩쿠르 1위, 경기도 지사상, 2013 대한민국 오페라 대상 특별상을 받았다. 그녀는 2021년 국립오페라단의 정기 시즌 오페라 &lt;라 트라비아타&gt;의 비올렛타 역으로 활약을 펼쳤으며, &lt;호프만의 이야기&gt; 안토니아 역, &lt;마술피리&gt; 파미나 역, &lt;유쾌한 미망인&gt; 발렌시엔느 역, &lt;1945&gt; 미즈코 역, &lt;왕자호동&gt; 낙랑공주 역의 주역을 비롯해 &lt;세빌리아의 이발사&gt; 로지나 역, &lt;코지 판 투테&gt; 피오르딜리지 역, &lt;리골레토&gt; 질다 역, &lt;사랑의 묘약&gt; 아디나 역, &lt;라 보엠&gt; 무젯타 역, &lt;투란도트&gt; 류 역 등 다수의 오페라 주역을 맡았다. 모차르트 &lt;Requiem&gt;, 브람스 &lt;Requiem&gt;, 베르디 ...</p>
