        <h1>카트리나 크룸파네</h1>
        
        <p><strong>Name:</strong> 카트리나 크룸파네</p>

        <p><strong>Profile:</strong> 한국과 독일을 넘나들며 활발히 활동중인 소프라노 카트리나 크룸파네 (Katrina Krumpane)는 라트비아 다우가필스 음악학교를 졸업하고 베를린 국립음대에서 세계적 바리톤 Siegfried Lorenz를 사사하여 디플롬과 마스터과정을 졸업하였다. 그녀는 2004년 베를린 코미쉬오퍼(Komische Oper) 에서 데뷔한 이후 베를린 국립오페라 극장(Staatsoper) 솔리스트를 역임 하였고, 이후 독일 드레스덴, 포츠담 및 오스트리아, 스위스, 라트비아등에서 솔리스트와 객원 소프라노로 활동 하였다. 라보엠, 피가로의 결혼, 돈지오반니. 마탄의 사수, 박쥐, 리골레토 등 다수의 오페라 솔리스트를 역임하였고, 그녀는 현재 성신여자대학교 성악과 초빙교수를 역임하고 있으며, 연세대, 추계예술대학교 등 초청 마스터클래스 및 여러 객원 솔리스트 활동을 이어가고 있다.</p>
