        <p><strong>Profile:</strong> 대한민국 인천 출생의 베이스 이형욱은 단국대학교 음악대학 성악과에 4년 장학생으로 입학하여 장유상 교수를 사사하고 수석으로 졸업한 후 도독하여 베를린 국립에술대학교(UdK Berlin)에 입학하여 Prof. Siegfried Lorenz, Prof. Harald Stamm 를 사사하고 오페라전공 최초로 심사위원 만장일치 최고점수로 졸업하였다. 국내에서 중앙일보 콩쿨 3위 입상을 시작으로 독일 라인스베르크 국제오페라콩쿨, 일본 오키나와 슈가홀 국제음악콩쿨 1위에 입상을 하며 독일 도이췌 오퍼 베를린(Deutsche Oper Berlin) 장학생 및 베를린 벨칸타레 협회 장학생으로 선발되면서 전문연주자로서 두각을 나타내기 시작하였다. 베를린 국립예술대 재학 중이던 2004년 시즌부터 도이췌 오퍼 베를린 전속 솔리스트로 발탁되어 8년 동안 전속가수로 활동하였고, 현재까지도 프리랜서 주역가수로 활약하면서 브라운슈바익, 호프, 막데부룩, 인골슈타트 등 독일 유수의 극장과 스위스 바젤, 스페인...</p>
