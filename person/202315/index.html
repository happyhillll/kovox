        <p><strong>Profile:</strong> 에너지 넘치는 발성과 매우 정교한 딕션으로 이탈리아 청중을 사로잡 은 소프라노 오한나는 장로회신학대학교 교회음악학과에서 성악을 전공하였다. 국립합창단원으로 오페라 &#x27;피가로의 결혼&#x27;과 윤이상의 &#x27;심청&#x27;에 출연 하였고 CCM 음반 &#x27;Miracles&#x27; 녹음 작업에 참여하였다. 이탈리아 제 노바 파가니니 국립 음악원 재학중 이탈리아 모데나 극장에서 모짜르 트의 오페라 &#x27;가짜 정원사&quot;와 치마로자의 오페라 &#x27;비밀결혼&#x27;에 주역으 로 데뷔하였다. 이후 제노바 국립음악원 비엔니오 오페라 과정을 수 료하고 제노바 카를로 펠리체 극장에서 베르디의 &#x27;가면무도회&#x27;와 &#x27;해 적&#x27; 공연에 참여하였다. 제노바 시 문화홍보대사로 러시아 에카테린부르그 오페라 극장에서 로시니의 &#x27;팔미라의 아우렐리아노&#x27;와 베르디의 &#x27;라 트라비아타&#x27;를 공 연하였고 제노바 국립음악원 오케스트라와 페르골레지의 &#x27;스타바트 마테르&#x27;를 협연하였고 제노바 아렌짜노 음악 아카데미에서 성악 및 보컬 지도교수를 역임하였다. 이 밖에 체코 공화국과 시칠리...</p>
