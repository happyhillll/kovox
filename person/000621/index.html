        <p><strong>Name:</strong> Dieter Paier</p>

        <p><strong>Profile:</strong> 오스트리아 출신의 Dieter Paier 는 오스트리아 그라츠 국립음대에서 Otto Niederdorfer 와 Gerhard Zeller 교수의 지도 아래 성악반주와 음악교육학을 공부하였다. 그라츠 국립음대에서 리트오라토리오과 반주강사를 역임하였으며, 2004년부터 2007년까지 빈 국립음대에서 KS Edith Mathis 의 리트클래스 전속 반주자로 일하였다. 그는 또한 Gundula Janowitz, Sena Jurinac, Hilde Zadek, Sona Ghazarian 및 Thomas Quasthoff 마스터클래스 반주자로 활동하였다. Dieter Paier 는 현재 유럽 각지에서 독창회 반주와 CD녹음으로 왕성한 활동을 펼치는 동시에 1997년부터 오스트리아 빈 국립음대에서 오페라과 및 리트오라토리오과 전임강사로 후학을 양성하고 있다.</p>
