        <p><strong>Profile:</strong> 따뜻한 음성과 화려한 기교의 소유자 소프라노 윤선화는 한성대학교 예술대학 성악과를 졸업한 후 도이하여 로마 산타 체칠리아 국립음악원(Santa Cecilia Conservatorio) 성악과 Diplomino, 파우스토 토레프란카 국립음악원(Fausto Torrefranca Conservatorio) 성악과 Diploma를 취득하였으며 파우스트 토레프란카 Conservatorio Biennio를 수료하였다. Ami Accademia 2년 과정, Roma Accademia 1년 과정을 수료하였으며 Firenze Trillo 국제음악학교 성악과와 합창지휘 Diploma를 취득하였다. 일찍이 대학시절 실기우수자로서 다수의 현업연구를 통하여 호평받은 소프라노 윤선화는 마에스트로 William Matteuzzi, Ruca Gorla, Marco Balderi, Franca Mattiucci, Ennio Clari 마스터 클래스에 참가하며 다양한 페드백을 쌓았고 Leopoldo Mugnone ...</p>
