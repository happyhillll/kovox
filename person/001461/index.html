        <p><strong>Profile:</strong> 소프라노 최예슬은 선화예술학교와 선화예술고등학교를 거쳐 서울대학교에 입시성적우수자로 장학금을 받으며 입학 했으며 우등으로 학사 졸업 (Cum Laude) 하였다. 동 대학원에서 석사 학위 취득 후 도미하여 뉴 잉글랜드 콘서바토리(New England Conservatory)에서 장학금 Vir ginia Aherns Voice Scholarship Fund를 받고 Dean&#x27;s List에 두 번 이나 오르며 석사를 취득하였다. 이후 끊임없는 학구열을 바탕으로 매네스 음악대학(Mannes School of Music)에서 전문연주자과정 (Professional Studies diploma)을 취득 하였다. 일찍이 두각을 나타내며 국내에서 이화경향콩쿨 1등, 평택대 콩쿨 대상, 한 콩쿨 1위 를 수상했으며, 구리시 교향악단과 협연 및 선화예고 정기연주회 협연, 울오케스트라와 협연 및 서울시오페라, 인씨엠오페라 등 오페라무대에서 활동하였다. 뉴욕에서 Arthur Levy에게 사사받으며 오페라...</p>
