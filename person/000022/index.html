        <h1>전혜영</h1>
        
        <p><strong>Name:</strong> 전혜영</p>
        <p><strong>Role:</strong> accompanist</p>
        <p><strong>Medium:</strong> piano</p>
        <p><strong>Profile:</strong> 서울대학교 음악대학 기악과 졸업 후 전문적인 반주자의 길을 걷기 위해 프랑스로 유학하여 파리 국립음악원 (CNR de Paris)에서 반주과 Diplome을 취득하였다. 프랑스 에브리 과학대학 초청 연주, ＂Carte Blanche＂ 메시앙 기념 음악회를 비롯한 다수의 성악, 기악 앙상블 및 독주를 통해 섬세하고 안정감 있는 연주라는 평을 받으며 연주의 폭을 넓혀 갔다. 귀국 후에는 목원대학교에서 프랑스어 딕션 및 프랑스 가곡 반주 강의를 하였고 현재 성신여자대학교 대학원에서 프랑스 가곡 문헌을 강의하고 있다. 또한 한국예술종합학교 반주강사, 헤븐스 뮤직그룹(주) 음악코치, 한국반주협회 정회원으로 활동 중이다. 성악을 중심으로 다양한 연주 및 음반 녹음에 참여하며 가곡 전문반주자로서의 연주의 폭을 넓혀가고 있다.</p>
