        <h1>김정옥</h1>
        
        <p><strong>Name:</strong> 김정옥</p>

        <p><strong>Profile:</strong> 이 있는 음악성을 지닌 소프라노 김정옥은 서울대학교 음악대학 성악과를 졸업 후, 독일 트로싱엔 국립음대 전문연주자(Kunstlerische Aufbaustudium) 및 최고 연주자 (Solistischen Ausbildung)과정을 졸업하였다. 유학 중에 독일 이리스 마크와르 드 콩쿨에 수상하는 쾌거를 거두었고 학업과 연주활동을 병행하며 음악의 폭과 깊이를 넓혀나갔다. 독일 트로싱엔에서 독창회를 비롯 트레프 바이 틸에서의 듀오콘서트는 현지 언론 슈바 르츠벨더보트지에 호평기사가 실리기도 하였고, 필링엔극장에서 &lt;지옥의 오르페우스&gt; 주역, 스페인 바르셀로나 Passau홀에서 갈라콘서트에 출연한 것 역시 트로싱어 짜이퉁 등에 기사화되면서 주목받았다. 또한 독일 Bundes Academy 초청연주를 비롯해 Even Pina (에벤피나) 솔리스트 앙상블 로 활동하면서 Brahms Requiem, Mozart Requiem, Mendelssohn 엘리야, Mozart 대관 식미사, Haydn...</p>
