        <p><strong>Profile:</strong> 부드러운 보이스와 섬세하고 감각적인 표현력의 소유자 소프라노 심나연은 성신여자 대학교 음악대학 성악과를 졸업하고 도독하여 카셀 시립음악대학교 성악과를 졸업하였다. 졸업 후에도 European Voice &amp; Music Academy 폴란드 국제 마스터 클래스를 수료하는 등 꾸준히 노력하며 학구적으로 공부했던 그는 실력을 인정받아 독일 카셀 국립극장에서 객원단원으로도 활동하였다. 성신여자대학교 재학시절부터, 작은 콘서트 를 열어 솔로로 연주하고, 봄을 여는 4인 콘서트, 듀오 콘서트 등 다양한 콘서트에서 연주하며 일찍부터 두각을 나타냈다. 독일 카셀 국립극장 단원으로 활동하면서 다수의 작품에 출연하였다. 대표적인 독일 오페라 &lt;뉘른베르크의 명가수&gt;, &lt;피델리오&gt;. 《탄호이저》, 로앤그린》을 비롯하여 &lt;파우스트) &lt;삼손과 데릴라&gt;, &lt;피터 그라임스〉 &lt;파우스트의 겹별》 등에 출연하였고, 콘체르트로는 브랍스 &lt;레퀴엠&gt;. 베르디&lt;레퀴엠&gt;, 말러 &lt;심포니 No.2&gt;, 《대지의 노래&gt;, 호네거 ...</p>
