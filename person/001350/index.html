        <p><strong>Profile:</strong> 소프라노 조은애는 인천예술고등학교를 거쳐, 이탈리아 밀라노 베르디 국립음악원에서 Tradizionale di Canto 과정을 졸업하며 음악인으로서의 기반을 갖춰 나갔다. 이탈리아 “Citta di Treviso Esecuzione Musicale” 국제 콩쿨 1등을 시작으로, 이탈리아 Erba di Comune, 스위스 Evangelicea rIformata di Vacallo, 미국 Jewish Community Center 등 여러 곳에서 리사이틀을 가졌으며, 미국 Denver에서 Colorado Korean Chorus와 함께 “The Great Birth, The Great Song” 공연에 솔로로 관중들에게 깊은 인상을 남겼다. Gianni Maffeo, Scarabelli Adellina를 사사한 소프라노 조은애는 이번 연주를 통해 풍부한 감성을 전하는 무대를 선사할 예정이다.</p>
