        <p><strong>Name:</strong> 홍은혜</p>

        <p><strong>Profile:</strong> 한국인 여성으로는 처음으로 프란츠 리스트 Transcendental Etudes S. 139(초절기교 연습곡) 전곡으로 독주회를 연 피아니스트 홍은혜는 리스트 스페셜 리스트인 Enrico Pace 와의 만남에 영향을 받아 2017년부터 매번 다른 리스트 곡들로 구성되어진 &quot;프란츠 리스트에게의 헌정&quot; (Piano solo recital : Hommage a Franz Liszt) 이라는 제목아래 천여 곡의 방대한 리스트 피아노 솔로 전곡 독주회 프로젝트를 한국과 유럽에서 진행 중이다. 4세에 피아노를 시작하였으며 예원학교, 서울예술고등학교, 이화여자대학교를 졸업하였다. 그 후 ☆ Felix Michael Deichmann 교수의 지도아래 독일 에센으로 건너가 에센 국립음대에서 전문 연주자 과정을 졸업하였으며 독일 뒤셀도르프 국립음대에서 실내악을 공부하였다. 이후 이탈리아 트렌토 국립 음악원에서 피아노 최고연주자 과정을 졸업하였으며, 음악적 멘토인, 모스크바와 줄리어드 음대 교수를 역임...</p>
