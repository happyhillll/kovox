        <p><strong>Profile:</strong> 청아한 음색과 섬세한 표현력의 소프라노 유주현은 경희대학교 음악대학 성악과를 우수한 성적으로 전 학기 전액 장학생으로 졸업하였다. 이후 경희대학교 교육대학원 음악교육과 역시 전액 장학생으로 졸업, 음악 교육자로서의 기반도 다졌다. 이후 교육자와 동시에 연주자로서의 기량을 갖추기 위해 독일로 유학하여 데트몰트 국립음악대학교(Hchschule fur Musik Detmold) 오페라과 석사과정을 심사위원 전원의 기립박수를 받으며 만장일치 합격. 이를 최고점으로 졸업하였다. 독일에서 그녀는 뛰어난 기량으로 데트몰트 국립극장 오페라 &lt;Le comte Ory&gt;의 Alice 역. &lt;La buona figliuola&gt;의 Sandrina 액 및 데트몰트 여름 극장의 현대 오페라 갈라 콘서트, 데트몰트 궁정 음악회 등 다양한 오페라와 콘서트에 출연하였다. 동 노르트라인베스트팔렌주 신문에서는 그녀를 &#x27;빛나는 기교를 가진 뛰어난 소프라노&#x27;라 호평하기도 하였다. 또한 성실함과 학구적 태도를 인정받아 이탈...</p>
