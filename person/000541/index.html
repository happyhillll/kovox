        <p><strong>Profile:</strong> 소프라노 이경희는 덕원예술고등학교와 숙명여자대학교 성악과를 우등으로 졸업하고 동 대학원에서 석사과정을 마친 후 도이하여 파르마 국립음악원에서 성악과정을 마치고 이탈리아 토리노 국립음악원에서 최고 연주자과정 및 가곡과정을 졸업하였다. 유학 당시 성적우수학생과 우수졸업생을 위한 특별음악회 및 토리노 라이온스클럽 장학금을 2회 수여받았다. Eva Mei, Patrizia Ciofit, Michele Pertusi의 마스터 클래스에 참여하였고 특히 Mirella Freni의 전문연주자 심화과정의 피날레 연주자로 선정되었다. 토리노 국립음악원이 주최한 라벨의 오페라 &lt;어린이와 마법&gt;과 푸치니 탄생 150주년 기념 음악회에서 주목을 받아 피에몬테 필하모닉 오케스트라와 협연으로 피에몬테 주 순회 송년음악회를 시작으로, 라이 방송 오케스트라, 레코 오케스트라, 라티나 오케스트라와 지휘자 Mario Lamberto, Claudio Morbo, Arturo Sacchelli, Nicola Calabi...</p>
