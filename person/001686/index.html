        <p><strong>Profile:</strong> 기품있는 음악성과 따뜻한 음색으로 관객을 사로잡는 소프라노 손순남은 숙명여자대학교 및 동 대학원을 졸업한 후 도미하여 피츠버그 듀케인 대학교 음악대학원을 석사 졸업하였다. 이후 노스웨스던 대학교 대학원 섬머스쿨과 로마 아이다 콘서바토리. 베를린 예술대학을 수료하였다. 미국 NATS 국제콩쿠르 2위, National Collegiate Music Awards를 비롯한 수많은 콩쿠르에서 수상을 한 그는 미국에서 모차르트 오페라 &lt;Don Giovanni&gt;의 &#x27;돈나 안나&#x27; 역, 베토벤 오페라 &lt;Fidelio&gt;의 &#x27;마르첼리네(마르첼리나)&#x27; 역, 원리엄스 오페라 Rider to the Sea&gt;의 &#x27;캐서린&#x27; 역을 비롯 피츠버그 오페라단에 서 푸치니의 &lt;Turandot&gt;, 레온카발로의 &lt;Pagliacci&gt;, 비제의 &lt;Carmen&gt;, 베르디의 &lt;Aida&gt;, 파바로티 Galla Concert 등 다양한 오페라 무대에 오르며 오페라 가수로서의 입지를 다졌다. 또한 KBS열린음악회, 금호아트홀 초청독창회...</p>
