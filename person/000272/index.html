        <p><strong>Profile:</strong> 열정적인 감동과 섬세한 표현력의 소유자 바리톤 정재원은 연세대학교 음악대학 성악과 재학시절 모차르트의 오페라 &lt;피가로의 결혼&gt;에 출연하여 독일 음악과의 인연을 쌓았다. 이를 계기로 모차르트의 고향인 오스트리아 짤츠부르크 Universität Mozarteum에서 Sommer Meisterkurs를 수료하였다. 연세대학교를 졸업 후 독일음악과의 열정을 이어가기 위해 도독하여 음악의 명문 베를린 Hochschule für Musik Hanns Eisler에서 성악(가곡, 오페라과) 연주자 과정을 졸업하였다. 또한 Hochschule für Musik und Theater Rostock 성악(가곡, 오페라과) 최고연주자과정(Konzert Examen)을 졸업하였으며, Dietrich-Fischer Dieskau 마스터클래스를 수료하였다. 이후 베를린 Studiosaal der Hochschule für Musik에서 &lt;Le nozze di Figaro&gt;의 Figaro역으로, &lt;Zaide&gt;...</p>
