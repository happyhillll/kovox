        <p><strong>Profile:</strong> 호소력 있고 아름다운 목소리의 리릭 테너 염성호 Angelo Yeom 테너 염성호는 총신대 교회음악과 성악전공을 실기 최우수로 졸업하고 2007년 한국교회음악학회가 주최한 신인연주회에 출연하여 많은 박수를 받았다. 이후 캐나다 밴쿠버로 유학길에 올라 세계적으로 유명한 미국의 Metropolitan Opera Council이며, 카운터 테너 이동규 (David DQ Lee)를 발굴한 S. K. Lee college at VAM (Vancouver Music Conservatory)에 실기수석으로 입학하여 테너 David Meek (Voice Department of Head)를 사사, 실기장학생으로 캐나다 밴쿠버 퀸 엘리자베스극장, 시청연주회 등에 출연하였으며 성악 연주학 석사 (Diploma / Vocal Performance)를 최고점수로 졸업하고, 캐나다 밴쿠버 오페라 길드, 밴쿠버 국제음악협회 등 여러 곳에서 두각을 나타냈다. 세계적으로 왕성하게 활동을 하고 있는 이태리의 유명...</p>
