        <p><strong>Profile:</strong> 테너 김정훈은 한국예술종합학교를 우수한 성적으로 졸업한 후 도미하여 University of North Carolina School of the Arts 에서 석사학위를 우수한 성적으로 받았으며 Arizona State University 에서 전액장학생이자 실기 조교 및 강사로 수업과 성악실기를 가르치며 박사학위를 받았다. 타고난 음악성과 감성이 풍부하고 열정적인 미성의 소유자인 테너 김정훈은 일찍이 음악저널 콩쿨 1위에 입상하면서 두각을 나타내었으며 Arizona Opera League 콩쿨 1위, Metropolitan Opera NC District 콩쿨 1위, Opera Carolina Guild 콩쿨 3위, Orpheus 국제 콩쿨 입상 등 다수의 콩쿨에서 입상하면서 훌륭한 음악성과 소리를 인 정받았다. 오페라와 오라토리오를 넘나드는 테너로서 오페라 비밀결혼,헨젤과 그레텔, 봄봄, 돈죠바니, 사랑의묘약, 마술피리 등 총 24편의 다른 오페라에서 주역 및 조역으로 공연하였고...</p>
