        <p><strong>Profile:</strong> 테너 김우경은 한양대학교 음악대학 성악과를 졸업 후 독일 뮌헨 국립음악대학 Meister Klasse 과정을 졸업하였다. 그는 한양대 재학시절 중앙음악콩쿠르 1위를 비롯하여, 유학 중 플라시도 도밍고 국제 성악콩쿠르 1위, 스페인 비냐스 국제 성악콩쿠르 1위, 핀란드 미리얌 헬린 국제 성악콩쿠르 1위 등 권위 있는 많은 콩쿠르에서 우승하며 국제무대에서 주목 받았다. 2004년 플라시도 도밍고 오페랄리아 국제 성악 콩쿠르 당시, 한국 테너 최초로 우승하였고, 도밍고는 &quot;그의 테크닉은 완벽했고, 음악의 해석은 더는 그를 따를 사람이 없을 만큼 놀라웠다.&quot; 라고 호평 하였다. 또한 독일 활동 당시 참가했던 노이에 슈팀메 콩쿠르에서 그의 노래를 들은 독일 현지 신문에서는 &quot;20세기 최고의 테너 프리츠 분더리히가 환생했다&quot;라는 극찬과 함께 기사화 되었다. 그는 한국인 최초로 세계 3대 대표 오페라극장인 뉴욕 메트로 폴리탄, 런던 코벤트가든, 이탈리아 라 스칼라 극장에서 주역으로 데뷔하였다. ...</p>
