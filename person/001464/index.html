        <p><strong>Profile:</strong> 소프라노 라하영은 대원여자고등학교를 졸업했다. 이후 한국예술종합학교 음악원 성악과 (김영미 사사)를 졸업하고, 독일 함부르크 국립음대 (Hochschule fuer Musik und Theater Hamburg, Michaela Kaune 사사) 석사과정(Master Oper)을 마쳤다. 일찍이 탁월한 음악성을 인정받은 소프라노 라하영은 고등학교 시절부터 여러 콩쿨을 우승하며 두각을 나타내기 시작했다. 수리음악콩쿠르 1 위, 한국음협콩쿠르 1 위, 음악저널콩쿠르 1 위, 이화경향콩쿠르 2 위, 독일 가곡 콩쿠르 2 위, 성정전국음악콩쿠르 은상, 대구성악콩쿠르 최우수상, 한국 성악콩쿠르 3 위, 광주성악콩쿠르 3 위, Mozart-Preis fuer Gesang Wettbewerb 2 위, Gustav Mahler Liedwettbewerb 2 위, Elise Meyer Stiftung Wettbewerb 3 위, Wilhelm Stenhammer International Music ...</p>
