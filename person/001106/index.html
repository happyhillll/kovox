        <p><strong>Profile:</strong> 배우 서태화는 한양대학교 음악대학 성악과를 졸업하고 이태리를 거처 미국 맨하탄 음악대학 성악과에서 석사학위를 취득하였다. 우연한 기회에 영화배우의 길을 걷게 되어 장편 데볶작인 &quot;억수탕&quot;으로 청룡영화상에서 조연상에 노미네이트되면서 본격적인 배우의 삶을 살고 있다. 2000년에는 영화 &quot;친구&#x27;에서 모범생 상택 역을 맡아 열연을 펼친 결과 메가 히트작이 되어 대중들에게 별리 이름을 알리는 계기가 되기도 하였다. 그후로 장르를 넘나들며 노틀담 드 파리. 아름다운 세상을 위하여 넌센스 등 다수의 뮤지컬 작품과 &quot;연애시대&quot;, &quot;산 넘어 남촌, &#x27;정약용&quot;, &quot;야차&quot;, &#x27;날씨가 좋으면 찾아 가겠어요&quot; 등 수많은 드라마와 &quot;닥터K&#x27;, &quot;유리정원&quot;. &quot;짓&quot;. &quot;장&quot;, &quot;나도 아내가 있었으면 좋겠다&quot;, &quot;이웃집 남자&#x27;&quot;, &quot;아직 사랑하고 있습니까?&quot; 등 다수의 영화 그리고 오페라 엘버트헤링(한국 초연), 오텔로, 라 트라비아타 외 다수의 음악회와 독창회를 했다. 이렇듯 멀티시대에 걸맞는 행보로 앞으로...</p>
