        <p><strong>Profile:</strong> 김민지는 계원예고와 단국대 기악과를 졸업하고 독일로 건너가, 드레스덴 국립음대 피아노과에서 디플롬과 최고 연주자 과정(Konzertexamen)을 최우수성적으로 졸업하였다. 드레스덴국립 음대 시절 바리톤 울라프 베어(Olaf Baer)의 사사로 가곡 반주과를 부전공으로 수료하였고, 그 후 뮌헨국립음대에서 헬무트 도이치(Helmut Deutsch)를 사사하며 가곡 반주과 최고연주자과정(Meisterklasse)을졸업하였다. 귀국 후 연세대, 단국대 성악 반주자를 역임했고, 현재 서울대 성악 반주자로 활약하고 있다. 뛰어난 음악성을 바탕으로 금호아트홀에서 두 번의 독주회를 개최하였고, 다수의 독창회 등에서 반주자로 활동 중이다.</p>
