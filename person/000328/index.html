        <p><strong>Profile:</strong> 탁월한 예술성과 섬세한 음색을 지닌 소프라노 정지원은 선화예술학교와 서울예술고등학교를 거쳐 이화여자대학교를 졸업하였고 이태리로 유학하여 로마 아레나아카데미아 2년과정 디플로마를 수료하였다. 이후 영국 런던으로 건너간 그녀는 &#x27;높은 음악적 재능으로 영국과 더 나아가서는 국제적으로 상당한 기여를 할 잠재력을 지닌 뮤지션&#x27;이라는 찬사를 받으며 심사위원 만장일치로 영국왕립대학교를 국제학생 자격으로 최고장학생 대우로 입학하였고 재학기간동안 Helen Marjorie Tonks Award 와 Opperby Srokowski 장학금을 받았다. 또한 음악에 대한 학구열과 끊임없는 노력으로 두 번의 졸업연주에서 모두 높은 성적을 거두어 연주자 석사과정(Master of Performance in Vocal Performance)을 최우수 졸업하였다. 일찍이 신영옥 콩쿨과 이탈리아 아레나 국제음악콩쿨(Consorso Interzionale Di Accademia Arena) 입상으로 음악성을 인정받은...</p>
