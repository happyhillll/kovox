        <p><strong>Profile:</strong> 맑고 아름다운 음색의 소유자 소프라노 이영은은 강원예술고등학교를 거쳐 성신여자대학교 음악대학을 수석 졸업(전액 장학금 수혜)하고, 동 대학원에서 석사 과정을 마쳤다. 이후 도미하여 피바디 음악대학(Peabody Institute of the Johns Hopkins University)에서 석사 과정 및 연주자 과정을 졸업하였으며, 미네소타 대학교 음악대학(University of Minnesota)에서 Harvey Berneking Scholarship 장학금을 받으며 박사 학위(DMA)를 취득하여 전문 연주자로서의 기반을 마련했다. 다수의 리사이틀, 앙상블, 챔버 연주를 통해 무대 경험을 쌓은 이영은은 Thursday Musical Artist 초청 연주, Kenwood Symphony Orchestra, Occasional Symphony와의 협연, A, Vivaldi의 &lt;Gloria&gt;, G.F. Handel의 &lt;Messiah&gt;에서 솔리스트로 활약하며 청중과 평단의 호평을 받았...</p>
