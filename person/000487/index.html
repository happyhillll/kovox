        <p><strong>Profile:</strong> 바리톤 한경석은 서울대학교 음악대학 성악과와 동 대학원 재학 중 동아, 중앙콩 쿨에 입상하였고 신춘음악회와 영미가곡의 밤에 출연하였으며 서울대학교 정기 오페라에서 &#x27;Don Giovanni&#x27;를 공연하였다. 그 후 독일 Stuttgart 국립음대에 입학 하여 성악과와 오페라과를 졸업하고 올해의 신인 성악가에 초청되어 연주하였 다. 2000년 세종오페라페스티벌에 초청되어 &#x27;Cammen&#x27;을 공연하였고 2001년부터 독일 Schwerin 국립오페라극장에서 전속 주역 바리톤으로 &#x27;Otello&#x27;, &#x27;Don Carlo&#x27;, &#x27;Turandot&#x27;, &#x27;Carmen&#x27;, &#x27;Tannhäuser&#x27;, &#x27;Zar und Zimmermann&#x27;, &quot;Orteo ed Euridice&#x27;, &#x27;Fidelio&#x27;, &#x27;Katia Kabanova&#x27; 등 수 십 편의 오페라를 공연하였다. 그 밖에 Bach 의 &#x27;h-moll Messe&#x27;, &#x27;Magnificat&#x27;, Rossini의 &#x27;Petit Messe&#x27;, Carl Orff의 &#x27;Carmina...</p>
