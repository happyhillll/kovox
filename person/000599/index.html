        <p><strong>Name:</strong> 김효선</p>

        <p><strong>Medium:</strong> soprano</p>
        <p><strong>Profile:</strong> 성실한 테크닉과 함께 아름다운 음색으로 청중들의 마음을 매료시키는 소프라노 김효선은 세종대학교 음악대학 성악과를 수석 졸업하였고, 예원예술대학 전체 수석으로 졸업한 후, 미국으로 건너가 클리블랜드 음악원 석사과정을 졸업하였다. 일찍이 세종대학교 재학 시절부터 많은 무대에서 관객과의 소통을 해온 그녀는 세종대학교 신입생 음악회, 세종대학교 오케스트라 협연, 성악의 밤, 오페라 갈라 콘서트에 출연, 그 외에 광명청소년교향악단과의 협연을 통해 많은 무대에 올랐다. 국립극장과 경기도 문화의 전당, 세종문화회관 등 수많은 무대에서 그녀의 목소리를 들을 수 있었다. Sakata Yasuko(이화자), 박선희, 류미, 김인수, Mary Schiller를 사사한 그녀는 광이신교회에서 성악의 본질적인 음악을 다지는 기회를 가졌으며, 꾸준한 활동으로 관객과의 소통을 이어가는 중이다.</p>
