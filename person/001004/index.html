        <p><strong>Profile:</strong> 소프라노 신소영 소프라노 신소영은 충남대학교 예술대학 음악과를 졸업한 후, 도이아니아의 Giuseppe Nicolini 국립음악원을 졸업하였고, 동 음악원에서 조교 과정을 통해 학문적 업적과 연주 경험을 쌓았다. 그 후 Milano에서 국제 아카데미아 최고연주자 과정을 3년간 이수하고, 동 아카데미아에서 오페라 스코어 과정을 2년 이수한 후 &#x27;Europea delle Arti Professioni e Mestieri&#x27; 오페라스코어 과정을 수석 졸업하였다. 또한 Piacenza에서 개최된 &#x27;Rotary Club&#x27; 콩쿠르에서 특별상을 수상하였다. 또한, 유럽 전역에 걸친 오디션에 선발되어 네덜란드 &#x27;Kunstmin Theater&#x27;에서 공연된 오페라 &#x27;La Serva Padrona&#x27; 및 &#x27;Il Convito di Pietra&#x27;에서 주역으로 2년에 걸쳐 출연하여 현지 언론으로부터 극찬을 받은 바 있다. 이탈리아 Barlassina에서는 Giuseppe Verdi 목관 앙상블 크리스마스 초청...</p>
