        <p><strong>Profile:</strong> 오스트리아와 독일에서 수학한 피아니스트 박상욱은 17세에 빈 필하모닉 오케스트라가 상주하고 있는 세계적 공연장인 오스트리아 빈의 Musikverein(황금홀)에서 협연하며 유럽 음악계에 데뷔하였다. 실내악에도 남다른 애정을 보여 세계적 피아노 트리오인 Altenberg Trio에게 사사하고 이미 어린 나이에 여러 실내악 국제콩쿠르에서 상위 입상하며 실내악 분야에서도 뛰어난 두각을 나타내었다. 세계 최정상 오케스트라 중 하나인 빈 필하모닉의 수석 연주자들과 오스트리아 벨베데레 궁전 재개관 기념식에서 말러의 피아노 4중주를 연주하였으며 이 공연은 오스트리아 국영방송을 통해 전역에 방송되었다. 2013년부터 그가 활동 중인 피아노 듀오 신미정과 함께 2015년 세계적인 연주자의 등용문으로 알려진 ARD 국제 콩쿠르에서 2위를 하며 세계 음악계의 주목을 받았고, 체코에서 열린 제20회 국제콩쿠르에서 심사위원 만장일치로 우승, 북유럽 오슬로, 이탈리아 등에서도 참가한 콩쿠르까지 모두 연이어 ...</p>
