        <p><strong>Name:</strong> 조남</p>

        <p><strong>Profile:</strong> 소프라노 조남은 2008년 Shenyang Conservatory of Music 성악과를 석사로 졸업하였으며 2013년 Italy Alcamo vocal complete에서 입상하며 두각을 나타내었다. 2013년에는 중국 경기구콩쿨에서 우수상을 수상하며 이름을 알리기 시작했으며 활발한 활동을 시작하였다. 중국 안산사범대학교 강사로 후학을 양성하였으며, 예술성의 깊이를 위하여 한국에서 활동을 시작하였다. 2017년부터 안양예술문화회관 공연에 참가하였고, 한전아트센터 공연, 수원 문화회관 공연 등 활발한 활동을 하고 있다. 아리랑 코러스 정기연주회, 기획연주회 등 예술의전당에서 다수 연주, 박사 리사이틀 4회 공연 등 지속적인 활동을 펼치고 있다. 한나형 교수를 사사하며 현재 더 보이스 챔버 콰이어 단원(지휘 이병직), 한세대학교 성악 박사과정을 밟고 있다.</p>
