        <p><strong>Profile:</strong> 풍부한 음색과 화려하고 섬세한 표현력을 겸비한 소프라노 송은경은 서울신학대학교 교회음악과를 졸업하였다. 그 후 프랑스 Conservatoire International de Music de Paris에서 Superieur를 1등으로 졸업하고 프랑스 젠느빌리에 국립음악원(Conservatoire Edgar Varese) 전문연주자 과정(DEM) 및 최고연주자 과정(perfectionnement)을 졸업하였다. 프랑스에서 가진 두 번의 독창회는 열화와 같은 갈채를 받았으며 현지에서도 화제를 모았다. 사단법인 서울오케스트라 제23회 콩쿠르 성악일반부 1등 및 전체 대상을 수상하였고 콩쿠르 입상자 연주회를 광림아트센터 장천홀에서 오케스트라와 함께 협연하였다. 또한 화성시 3.1운동 103주년 기념식에서 솔리스트로 애국가 제창을 하였고 코리아제이드 필하모닉 오케스트라 제12회 정기연주회 협연자로 참여하여 큰 호응을 받았다. 그 외에도 한국-뉴질랜드 수교 60주년 기념 클래식 콘서트 솔리스트로...</p>
