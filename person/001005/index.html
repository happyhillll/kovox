        <p><strong>Profile:</strong> 따뜻하고 아름다운 소리를 지닌 리릭 소프라노 김방술은 서울대학교와 대학원을 졸업하고 도미하여 맨하탄 음대 석사 과정을 충장상을 받아 전액 장학금으로 졸업하였다. 이어 줄리어드 오페라 센터에서 영아티스트로서 활동하였으며, 보리그랜트를 받아 피렌체 미켈란젤로 아카데미에서 이태리어 과정을 수료하였다. 루치아노 파바로티, 토마스 햄슨, 키리 테 카나와, 루치아 알바네세, 찰스 리커 등과 마스터 클래스를 하는 영광도 얻었다. 수상 경력으로는 중앙콩쿨 입상, 메트로폴리탄 콩쿨 뉴저지 지역 우승, 리더크란츠 콩쿨, 퀸즈 오페라 콩쿨 우승 등 다수 입상하였다. 국립합창단, 서울시립합창단, 부산시립합창단, 부천시립합창단, 광주시립합창단 등 국내 주요 합창단과 헨델의 &quot;메시아&quot;, 멘델스존의 &quot;엘리야&quot;, 브람스의 &quot;독일 레퀴엠&quot;, 포레, 모차르트 &quot;레퀴엠&quot;, 카를 오르프의 &quot;카르미나 부라나&quot;, 베토벤 &quot;합창 교향곡&quot;의 솔리스트로 활동 중이다. 오페라로는 《라보엠의 미미》, 《라 트라비아타의 비올렛타》,...</p>
