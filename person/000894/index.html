        <p><strong>Profile:</strong> 세계적 권위를 자랑하는 BBC 카디프 성악 콩쿠르에서 한국인 최초로 우승하며 한국을 대표하는 비르투오조로 자리매김한 바리톤 노대산은 명징한 표현력과 &#x27;한국의 베토벤&#x27;이라는 벨명을 갖고 있던 유영욱은 10세 때 자신의 작품 발표회를 가질 정도로 작곡에 놀라운 재능을 보이며 어릴 적부터 국내 언론의 집중적인 스포 트라이트를 받았다. 예원학교 재학 중 도미한 그는 예비학교를 거쳐 줄리어드 응대 에 입학 후 학부과정을 통해 Martin Canin, Jerome Lowenthal 교수에게 사사하고, 맨해튼 음대에서 석사 과정을 밟으며 Solomon Mikowsky 교수에게 사사했다. 1998년 제 13회 스페인 산탄데르 국제 피아노 콩쿠료 (Paloma O&#x27;shea Santander International Piano Competition)에서 만장일치로 대상을 수상하며 유영욱은 4한 유로의 상금과 세계 20여 개국을 아우르는 콘서트 투어, Naxos와의 리코딩 계약 등을 부상으로 받게 된다...</p>
