        <p><strong>Profile:</strong> 따뜻한 음색과 울림있는 섬세한 표현력으로 청중들의 마음을 사로잡는 소프라노 유희정은 연세대학교 성악과 및 서울대학교 음악대학 대학원을 우수한 성적으로 졸업한 뒤, 미국으로 도미하여 Indiana University at Bloomington에서 전문연주자과정(Performer Diploma)을 마치고, University of Colorado at Boulder에서 성악 연주와 페다고지(Voice Performance and Pedagogy)로 박사학위(Doctor of Musical Arts)를 취득하였다. 일찍이 KBS 신인음악콩쿠르 은상, 동아음악콩쿠르 3위, 이대웅콩쿠르 2위 등 국내 유수의 콩쿠르에 입상하며 두각을 나타낸 그녀는, Verdi의 &lt;Falstaff&gt;에서 ‘Nanetta’ 역(인디애나, 블루밍턴), Poulenc의 &lt;Les Dialogues des Carmélites&gt;에서 ‘Constance’ 역(인디애나, 블루밍턴), Mozart의 &lt;Die Zauberflöte...</p>
