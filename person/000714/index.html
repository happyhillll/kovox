        <p><strong>Profile:</strong> 소프라노 손영아는 숙명여자대하교 음악대학 성악과를 실기 수석으로 졸업하고 동 대학원을 전액장학생으로 졸업하였다. 이후 독일로 유학하여 칼스루에 국립음대(Hochschnule fuir Musik Karlsruhe)에서 오메라과(Operngesang)를 수료하고 트로싱엔 국립을대(Hochschule fur Musik Trossingen) 성악과(Gesang)에서 전문연주자과정(Kuinstlische Ausbildung)을 최고점수로 졸업하였으며, 동 국립음대에서 최고연주자과정(Konzert Examen)을 만장일치로 줄업하였다. 일찍이 국민일보 신인음악회에 출연하며 두각을 나타낸 그녀는 독일 유학하여 오펜바흐 오메라 1es contes d&quot;Hoffmann&#x27;에서 올림피아 역을 비못하여 모차르트 오메라 La finta giardiniera&#x27;의 산드리나 역, 메노티 오메라 &quot;The Telephone&#x27;의 루씨 역, 줄츠에서 개최된 야외오메라 베버의 &#x27;Der Freischiuitz&#x27; 등 수십여 ...</p>
