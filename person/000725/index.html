        <p><strong>Profile:</strong> 코레아나 클라시카 오케스트라(약칭:CCC)는 오페라 전문 오케스트라를 표방하며, 2007년에 탄생한 오케스트라로, 유럽 권과 미국에서 유학한 젊고 의욕 있는 연주자들로 구성되었다. 아직까지 한국에는 스칼라 오페라극장 오케스트라나, 메트로폴리탄 오페라 오케스트라 같은 오페라 전문 오케스트라가 없는 점을 착안하여, 2004년 귀국 후 국립오페라단, 서울시 오페라단, 예술의 전당을 비롯한 다양한 오페라단에서 약 70 여 편의 오페라 공연을 이끈 상임지휘자 양진모가 창단한 CCO는 철저한 수석 책임제로 각 파트의 수석 주자들을 중심으로 유기적인 앙상블을 만들어 나가는 방식으로 운영되고 있다. 2007년 뉴 서울 오페라단의 ‘토스카’, 2008년 ‘라 보엠’의 전국 순회공연, 2009, 2010,2011년 ‘춘향전’ 중국 천진, 하얼빈, 청도공연, 강동아트센터 개관 기념오페라 ‘사랑방 손님과 어머니’, 오페라 ‘나비 부인’, ‘마술 피리’, 삼호아트센터, 경기도 문화의 전당, 서울 광장 초청...</p>
