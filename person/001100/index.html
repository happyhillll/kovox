        <p><strong>Profile:</strong> 바리톤 최종우는 경희대학교 음악대학 성악과 및 동 대학원을 전공실기 전체수석으 로 졸업을 하였으며 학생시절부터 국내 유수의 콩쿨에 도전하여 수차례의 입상경력 을 쌓았다. 대학 3학년 재학시절 1989년, 제10회 MBC 대학가곡제에서 최우수 가창 상을 시작으로 1990년 동아콩쿨 2위, 1991년 KBS 한전음악콩쿨 1위, 1992년 대구 음협 주최 전국성악경연대회 최우수상, 특히 1991년 해외파견 음협콩쿨에서 우승을 하여 3년간의 병역의무를 특례 보충역 예술 특기자 활동으로 대체하게 되었다. 1993년 예술의전당 오페라하우스 개관기념으로 열린 국립오페라단의 오페라 &quot;Manon Lescaut&quot;의 바리톤 주역으로 전격 발탁되어 그 당시 비유학파로서는 보기 드물게 국립오페라단의 주역으로 데뷔하기도 했다. 더욱 폭 넓은 공부를 이어 가고자 이탈리아로 유학하여 그곳에서도 수많은 국제콩 쿨에 출전하며 학구적인 열정을 늦추지 않았다. Como시에 있는 유럽 음악 아카데 미아 전문 가수과정에 ...</p>
