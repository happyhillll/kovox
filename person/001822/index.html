        <p><strong>Profile:</strong> 소프라노 권주미는 가천대학교 음악대학 성악과를 졸업한 뒤 이태리 삐아첸짜 국립음악원 가곡과, 이태리 노바라 국립음악원 오페라과 석사를 졸업하였다. 유학 중 삐아첸짜 국립음악원에서 주최한 현대가곡 쇤베르크 &lt;정원의 책&gt;, &lt;Il Lied Tedesco&gt; 연주 및 노바라 국립음악원의 교내 오페라 &lt;라보엠&gt; 미미, &lt;카르멘&gt; 미카엘라에 출연하는 등 다양한 무대에서 활동하며 그 실력을 입증받았다. 국내에서 독일난민어린이를 위한 자선음악회에 출연(영산아트홀, 장천홀), 앙상블리안 &lt;음악적 대화&gt;에 출연 그리고 클래시크 청소년 뮤지컬 &lt;오후의 산책&gt; 음악감독으로 활동하며 자신의 음악세계를 구축하였던 그는 이숙영, 이승은, 김라희 교수, Tiziana Scandaletti, Dino Di Domenico를 사사하였으며 인천예술고등학교에 출강하는 등 후학양성에도 힘써왔다. 이번 귀국 독창회를 발판으로 국내에서 더 다양한 모습으로 활동을 이어갈 예정이다.</p>
