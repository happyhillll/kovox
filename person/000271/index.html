        <p><strong>Profile:</strong> 따뜻한 음색과 회려한 테크닉을 바탕으로 국내외를 오가며 오페라 주억 및 술리스트로 황발하게 활동 중인 소프라노 여지엉은 이화여자대학교 성악과 및 동 대학원을 줄업 한 후 도이하여 산탁 체칠리아(Santa Cecilia)국립음악원 Bienrio과정을 만점으로 입학 및 최고점으로 졸업하였고, 로마 A.LA Internazionale Academia Triennio 합창 지위 과정을 만점으로 즐업하있다. 국내에서는 신지화 교수. 국외에서는 Prol. A Maria Ferrante. A Pergolizzi, C. Tassoni를 사사한 그녀는 얼찍이 음악교육신문사 콩물 2위, 음악저널 콩물에서 입상하 며 두각을 나타내었으며 G. Smionalo 1위, Vilarosa 1위 및 S. Glola 특별상, P. Serrao 1위, Roma Rotery Symphony 39l, R. Etrusca 3위, Jole de Maria 관격특별상, A. Giacomotti, Citta di Napoli ...</p>
