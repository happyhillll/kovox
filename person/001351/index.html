        <p><strong>Profile:</strong> 테너 오현용은 한양대학교 음악대학 성악과를 졸업하고 도독하여 하노버 국립 음악원 (Hochschule fUr Musik, Theater und Medien, Hannover) 에서 석사 (Macter) 과정을 졸업하였다. 유학시절 오페라 Eugene Onegin, A midsummer Nights Dream 등 오페라 주 조역으로 출연하며 오페라 가수로서의 잠재적 능력과 실력을 인정받았다. 또한 독일 라인스베르크 콩쿨에서 입상하는 등 음악적 두각을 나타낸 그는 라인스베 르크 오페라 페스티벌에 초청되어 솔리스트 자격으로 프랑크푸르트 (Oder) 오 케스트라와 오페라 갈라콘서트, 오페라 마탄의 사수에 출연하였다. 국내에서는 테너 이원준 교수를, 국외에서는 Markus Schaler 교수를 사사한 테 너 오현용은 귀국하여 그만의 독창적이고 풍부한 음악과 역량을 선보이고 있고, 소리와 열정으로 관객에게 감동을 선사하는 실력 있는 전문 연주자로서 활발하 게 활동 중이며, 현재 인천예술고등학교...</p>
