        <p><strong>Profile:</strong> 피아니스트 박은식은 서울대학교 기악과 피아노 전공을 실기 수석으로 졸업하고 한국예술종합학교 전문사과정 중 도미하여 인디애나 음대에서 전설적인 피아니스트 메나헴 프레슬러와 공부하며 그의 피아니즘을 전수받았다. 이후 인디애나 음대에서 석사와 Artist Diploma를 마치고 뉴저지 주립대학에서 박사학위를 취득했다. 피아니스트 ‘엠마누엘 엑스’로 부터 “주도 면밀한 테크닉과 마술적인 색채를 표현해내는 연주자”라는 찬사를 받은 피아니스트 박은식은 쇼팽 녹턴 전집 음반을 통해 음악팬들과 평론가들에게 독창적인 음색과 견고한 음악적 구성으로 다시 한 번 호응을 이끌어 내고 있다. 인디애나 음대 Associate Instructor, 뉴저지 주립대학 예비학교 강사를 역임했고, 현재 전남대 교수로 후학 양성에도 힘을 쏟고 있다.</p>
