        <h1>위윤수</h1>
        
        <p><strong>Name:</strong> 위윤수</p>

        <p><strong>Medium:</strong> soprano</p>
        <p><strong>Profile:</strong> 따뜻한 음색과 섬세한 표현력의 소프라노 위윤수는 서울예술고등학교, 서울대학교 음악대학 성악과 그리고 서울대학교 대학원을 우수한 성적으로 졸업하였으며 박미혜 교수를 사사했다. 재학 중 이미 두각을 드러내 제24회 한국성악콩쿠르, 제17회 전국수리음악콩쿠르, 제16회 음악춘추콩쿠르, 제8회 서울필하모닉콩쿠르, 제27회 전국학생음악장학콩쿠르 등에 입상하였다. 2017년 오스트리아 비엔나 음악 대학 Music and Arts University of the City of Vienna에서 MUK LIED ACADEMY 디플롬을 취득하였으며, 세계적인 리트 반주자인 헬무트 도이치, 찰스 스펜서, 율리우스 드레이크의 마스터클래스에서 호평을 받았다. 오페라 &lt;라 보엠&gt;, &lt;마술피리&gt;, &lt;사랑의 묘약&gt;에 출연하였으며 현재 계원예고에 출강하여 후학 양성과 전문연주자로 활동하고 있다.</p>
