        <p><strong>Profile:</strong> 맑고 투명한 음색과 섬세한 표현력을 지닌 소프 라노 박수경은 서울대학교 음악대학 성악과를 졸 엄한 후 독일로 유학하여 Rostock 국립음대 전 문연주자과정(Künstlerisch Ausbildung)과 동대 학 최고 전문연주자과정(Konzert Examen)을 우 수한 성적으로 마친 재원이다. 국내에서 박노경, 고덕환 교수를, 국외에서는 Penka Christova 교수를 사사한 그는 &lt;리골레토 &gt;, &lt;마술피리&gt;, &lt;돈파스쿠알레&gt;, &lt;피가로의 결혼 &gt; 등 다양한 오페라 및 갈라 콘서트의 주역을 맡 아 일찍부터 그 실력을 인정받았으며, 바흐 &#x27;칸타 타&#x27;. 하이든 &#x27;천지창조&#x27;. 헨델 메시야&#x27;, 베토벤 &#x27;9 번 교향곡&#x27; 등에서 Soloist로 활약해왔다. C. Henning의 작품 초연 연주를 비롯해 다양한 활동을 통해 음악적 역량을 넓혀온 박수경은 독 일 Rostock. Hamburg. Stratsund, Schwerin, Guestrow 등에서 수회의 초청연주 및 독창회를 동해 현지...</p>
