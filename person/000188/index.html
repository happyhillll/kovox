        <p><strong>Profile:</strong> 우아함과 따뜻한 음색의 소유자 소프라노 김선희는 조선대학교 사범대학 음악교육과를 졸업하고 이후 이탈리아로 유학하여 밀라노 G. Verdi 국립음악원, 베르첼리 G. B. Viotti 최고연주자과정, 이탈리아 도니제티 아카데미아 지휘과정을 졸업하였으며, 국내에서는 한세대학교 음악과 음악학(D.M.A) 박사학위를 취득하였다. 호남예술제에서 여러 차례 최고상과 제14회 대한민국 오페라 대상에서 서울경제 공로상을 수상한 그녀는 한국음악협회(서울) 전국 학생대회에서 1위 수상한 것을 비롯하여 F. Schubert 국제콩쿠르 1위 없는 2위, 이탈리아 Rodi 국제콩쿠르 2위, 이탈리아 Tortona 국제콩쿠르 3위 등 다수의 국제콩쿠르에 입상하여 그 실력을 인정받았다. 특히 노벨평화상 광주 정상회의 독창자, 뉴욕 UN 세계 고아의 날 포럼의 독창자로서 보여준 뛰어난 가창력과 광주 비엔 날레 개막식. 국제영화제 폐막식에서 보여준 무대 매너는 국내 정상급 소프라노 김선희를 다시 한번 알리는 계기...</p>
