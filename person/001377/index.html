        <p><strong>Name:</strong> 나은진</p>

        <p><strong>Profile:</strong> 피아니스트 나은진은 덕원예고, 단국대학교를 전학년 장학생으로 졸업하고 도미하여 맨하탄 음대 피아노 석사를 졸업였으며 뉴잉글랜드 콘서바토리 (NEC)에서 반주과 전문연주자 과정을 졸업 하였다. 또한 맨하탄 음대 전학년 성적우수자, NEC 전학년 장학생으로 졸업하였다. 어린시절 월간음악 콩쿨 1등, 한국 예술 총연합회 전국음악콩쿨과 피아노학회콩쿨에서 2등으로 입상하였다. 뉴욕에서는 아티스트 인터내셔널 콩쿨에 입상하여 뉴욕 카네기홀에서 데뷔 독주회를 마치고 뉴욕과 보스톤에서 활발한 연주활동을 하였다. 2007년 귀국독주회를 시작으로 국립오페라 반주자를 역임하였고 선화예술학교 계원예술학교, 경기예술 학교에 출강하였다. 수원대학교와 숙명여대 특수대학원, 한국콘서바토리의 외래교수를 지내고 서울 오케스트라 콩쿨와 안양음악제 심사위원, kipp 음악캠프의 초빙교수를 역임하였다. 현재 단국대학교 반주과대학원에서 학생들을 지도하고 있으며 숙명여대에서는 반주강사로 출강중이다.</p>
