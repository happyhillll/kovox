        <p><strong>Profile:</strong> 바리톤 정록기는 한양대 음대에서 박수길교수를 사사하고 졸업후 1990년 도독, 칼스루에 국립음대 에서 롤란트 헤르만과 하르트무트 휠에게 사사, 최고연주자 과정을 졸업하였다. 1992년 국제 ARD 뮌헨콩쿠르 3위에 입상, 1993년 슈만의 고향인 쯔비카우에서 열리는 Robert Schumann 국제가곡콩쿠르와 그 이듬해인 94년 슈트트가르트 볼프협회에서 주관하는 Hugo Woll 국제가곡콩쿠르에서 연이어 우승하는 저력을 과시하였다. 이를 계기로 독일 Stuttgart Hugo-Woll Akademie와 하노버 NDR 방송국 런던의 Wigmore Hall, 에딘버러 국제 음악 페스티벌, 프랑스 파리의 루브르박물관, 네덜란드 암스테르담의 콘서트헤보우, 스위스 쮜리히 톤할레 등 전 유럽의 명성 있는 음악 단체들과 일본 아사히 신문사 주최 &#x27;볼프 가곡 전곡연주회 등에 초청을 받아 율리우스 드레이크, 하르트무트 휠, 어윈 게이지 에릭 슈나이더 등과 같은 세계적인 피아니스트들을 파트너로 연주하...</p>
