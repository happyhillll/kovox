        <p><strong>Profile:</strong> 바리톤 배종우는 서울출생으로 양정고등학교와 서울대학교 음악대학을 졸업하고, 졸업시 총동창회장상 을 수상하였고 안형일교수께 사사 받았다.
1979년 이태리로 유학하여 Milano에서 A.Saraceni에게 사사 받았고, 프랑스 Aix-en-provence 음악원 성악과와 오페라과를 졸업한 후, 파리에꼴노르말음악원을 수석으로 졸업하고, 동 음악원 최고연주자과정 (Concertiste)부문에서 음악원 최초로 성악부문에서 심사위원 만장일치의 최고점인 만점을 받고 졸업 하고, 네델란드 Utreicht음악원에서 U.Reinemann에게 사사받았다.
프랑스의 음악평론가인 Petit는 그의 연주를 새로운 시각으로 바라보고 재해석한 놀랍고도 감동적인 연주&quot;라고 평했으며, 보르도 신문은 다양한 색채의 음색과 풍부한 뉘앙스의 놀라운 해석&quot;이라 하였고, 프로방설 신문은 섬세하고 때론 강렬하면서도 환상적이고 기품있는 연주&quot;라고 했다.
