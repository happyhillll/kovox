        <p><strong>Profile:</strong> 이탈리아 출신의 피아니스트 토마조 레포레는 2006년 가브리엘라 시실로사사로 베네벤토 니콜라 살라 음악원을 졸업하였으며, 이후 피에르 나르시스 마시, 콘스탄틴 보기노, 로베르트 케펠, 누오보 콰르테토 이탈리아노, 미켈레 캄파넬라 그리고 오메로 프란체시에서 마스터 클래스를 받았다. 그는 계속해서 로마 산타 체칠리아 음악원에서 프랑코 메도리 교수 사사로 석사, 바젤 음악원에서 음악 연기 전공(사사 필리포 감바)으로 석사를 졸업하였고, 2008년 이탈리아 라치오주에서 수여하는 &#x27;올해의 최우수 피아노 학생상&#x27;을 받았다. 또한 그는 이탈리아 및 스위스의 수많은 피아노 콩쿠르에서 우승하였다. 토마조는 2014년 독일 브레멘극장의 오페라 코치로 그의 커리어를 시작했으며, 2017년 오스트리아 린츠 주립극장의 오페라 코치를 역임하였다. 2020/21 시즌부터 현재까지 오스트리아 빈 슈타츠오퍼에서 오페라 코치로 활동하고 있다. 또한 그는 필리프 조르당, 마르코 아르밀리아토, 니콜라 루이조티, 자코모...</p>
