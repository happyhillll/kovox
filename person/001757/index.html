        <p><strong>Profile:</strong> 소프라노 심규연은 한국예술종합학교 학사, 미국 맨해튼 음대(Manhattan School of Music) 석사, 미국 뉴잉글랜드 콘서바토리(New England Conservatory) 오페라 연주자 과정을 모두 최우수 장학생으로 졸업하였다. 미국 최고 권위를 자랑하는 메트로폴리탄 오페라 콩쿨(Metropolitan Opera National Council)의 커네티컷 지역 예선과 뉴잉글랜드 지부 결선에서 우승하였으며, 이외에도 Opera Connecticut 콩쿨, Opera Susquehanna 콩쿨, 오스트리아 그라츠 AIMS 오페라 콩쿨에서 우승, American Protege 오페라 부문 1위, 뉴욕 카네기홀에서 개최한 Forte 국제콩쿨 전체 대상 및 한국 전국수리음악콩쿨 전체 대상, 이화경향콩쿨 1위, 성정콩쿨 우승 등 국내외 여러 콩쿨에서 수상하며 큰 두각을 나타내었다. 미국 Delaware 오페라에서 Lakme로 데뷔 이후, 미국 뉴욕 Chautauqua 뮤직 페스...</p>
