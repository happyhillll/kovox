        <p><strong>Variant Title:</strong> A, mio cor, Aria - Sharp violins proclaim, Aria con Coro - The trumpet&#x27;s loud clangor, Dann tönt der Laut und Harfe Klang, Dunque, i lacci d’un volto… Ah crudel, How beautiful are the feet of them that preach the gospel of peace, I feel the Deity within Arm, arm ye brave, If God is for us, who can be against us?, Presti o Mai &#x27;Egizia terra, Si tra i ceppi, Tu del ciel ministro eletto, V&#x27;adoro pupille, V&#x27;adoro, Pupille, pupile, Where e&#x27;er You Walk, Where&#x27;re You Walk, A Feast of Lanterns, A Mirage, Arm, arm, ye brave!, Ben conosco a poco a poco, Donne mie, la fate a tanti, Ei del suo cor la brama... A tanto amor, I feel, I feel, the Deity within me… Arm, arm ye brave!, Mi-a-ou, Mon coeur s’ouvre à ta voix, Mon cœur s’ouvre à ta voix, V&#x27;adoro, pupille, V’adoro, pupille, What a Movie, Will There Really Be a Morning?</p>
