        <p><strong>Variant Title:</strong> Ah! Forsé Lui, Ah, forse lui, Alzati... Eri tu che macchiavi quell&#x27;anima, D&#x27;e miei bollenti spiriti, Dal più remoto esiglio, Dall&#x27;infame banchetto... Tu del mio Carlo al seno... carlo vive!, E il sol dell&#x27;anima, E strano!...Ah, fors’e lui che l’anima, E strano.. Sempre libera, Egli non riede ancor... Non so le tetre immagini, Egli non riede ancora... Non so le tetre immagini, Eri tu che macchiavi quell’anima, Estrano Ah Forse Lui, Sempre Libera, Ingemsico, Lunge da lei… De&#x27; miei bollenti spiriti, Morir! Tremenda cosa!… Urna fatale de mio destino, Parla, siam soli... Si, vendetta, tremenda vendetta, Per me giunto... Io morrò, Perfidil... Pieta, rispetto, amore..., Pietà rispetto amore, Signor, ne principe, Taccea la notte placida, Un giorno dolce... piu che i vezzi, È strano... Ah, fors&#x27;è lui... Sempre libera, È strano... sempre libera, ‘Perfidi!...pieta rispetto amore’, Tu del mio Carlo al seno</p>
